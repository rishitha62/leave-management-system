# Application Name
spring.application.name=Leave Management System

# Server Port
server.port=8080

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:leavemanagementdb
spring.datasource.driverclassname=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
jwT.secret=mySuperSecretKeyForLeaveManagementSystemThatIsLongEnough
jwt.expiration=86400000

# CORS Configuration
cors.allowedOrigins=http://localhost:3000

# Logging
logging.level.com.leavemanagement=DEBU@Šogging.level.org.springframework=INFO
logging.level.org.hibernate=INFO